<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>你的好意，可能害了牠｜正常版</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;background:#f6efd9;color:#2b2117}
header{background:#2f7d32;color:white;text-align:center;font-size:clamp(20px,3vw,32px);font-weight:900;padding:14px}
.app{max-width:1350px;margin:auto;padding:14px;display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:14px}
.board{position:relative;display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(7,96px);gap:6px;background:#2b2117;border:6px solid #2b2117;border-radius:22px;overflow:hidden}
.cell{background:#fff8df;border-radius:10px;padding:7px;position:relative;overflow:hidden;font-size:12px}
.good{background:#dff4d4}.bad{background:#ffdeda}.special{background:#fff1aa}.start{background:#fff8c8}
.num{font-size:21px;font-weight:900}.score{font-size:20px;font-weight:900}.plus{color:#2f7d32}.minus{color:#c94545}
.tokens{position:absolute;left:6px;bottom:6px;display:flex;gap:3px;flex-wrap:wrap}
.token{width:26px;height:26px;border-radius:50%;border:2px solid #111;color:white;display:grid;place-items:center;font-weight:900;box-shadow:0 2px 6px #0007}
.center{grid-column:2/7;grid-row:2/7;background:#fff7df;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:22px}
.center h1{font-size:clamp(36px,5vw,62px);margin:0;line-height:1.15}
.wood{background:#8b5429;color:white;font-weight:900;font-size:clamp(20px,3vw,34px);padding:12px 22px;border-radius:14px;margin:18px 0}
.side{background:white;border:4px solid #2b2117;border-radius:18px;padding:14px}
button,select,input{font:inherit}input,select{padding:7px;border:1px solid #ddd;border-radius:9px;background:white}
button{width:100%;border:0;border-radius:999px;background:#2f7d32;color:white;font-weight:900;padding:13px 18px;margin:6px 0;box-shadow:0 5px 0 #1d511f}
.brown{background:#8b5429;box-shadow:0 5px 0 #573214}.red{background:#c94545;box-shadow:0 5px 0 #7a2722}
.player{border:2px solid #ddd;border-radius:13px;padding:9px;margin:8px 0;background:#fffdf7}.now{outline:4px solid #ffd75a}
.dice{text-align:center;font-size:64px;margin:8px}.log{height:230px;overflow:auto;border-top:2px solid #ddd;padding-top:8px;line-height:1.45;font-size:14px}
.modal{position:fixed;inset:0;background:#0008;display:none;align-items:center;justify-content:center;padding:18px;z-index:9}
.card{max-width:560px;width:100%;background:#fffdf0;border:4px solid #2b2117;border-radius:20px;padding:22px;text-align:center}
@media(max-width:900px){.app{grid-template-columns:1fr}.board{grid-template-rows:repeat(7,78px)}.cell{font-size:10px}.num{font-size:16px}.score{font-size:15px}.token{width:21px;height:21px}.side{min-height:auto}}
</style>
</head>
<body>
<header>你的好意，可能害了牠｜不餵食野生動物大富翁</header>

<section id="setup" class="app">
  <div class="board" id="preview"></div>
  <aside class="side">
    <h2>開始遊戲</h2>
    <p>正常版：24格完整、沒有空白格、棋子會停在格子上。</p>
    <p><label>玩家人數　
      <select id="count" onchange="setupPlayers()">
        <option>2</option><option>3</option><option>4</option>
      </select>
    </label></p>
    <p><label>遊戲圈數　
      <select id="goal">
        <option value="2">2圈標準版</option>
        <option value="1">1圈快速版</option>
        <option value="3">3圈挑戰版</option>
      </select>
    </label></p>
    <div id="playerSetup"></div>
    <button onclick="startGame()">開始</button>
  </aside>
</section>

<section id="game" class="app" style="display:none">
  <div class="board" id="board"></div>
  <aside class="side">
    <h2>玩家區</h2>
    <div id="stats"></div>
    <div id="dice" class="dice">🎲</div>
    <button onclick="rollDice()">擲骰子</button>
    <button class="brown" onclick="showRules()">規則</button>
    <button class="red" onclick="location.reload()">重新開始</button>
    <div id="log" class="log"><b>遊戲記錄</b></div>
  </aside>
</section>

<div class="modal" id="modal"><div class="card" id="modalCard"></div></div>

<script>
const colors=["#d84b3d","#2578bd","#399443","#e1a51f"];
const animals=["🐒 台灣獼猴","🦌 梅花鹿","🐿️ 松鼠","🦉 貓頭鷹"];
const spaces=[
["起點","經過 +100",0,"start",1,1],
["看到猴子不餵食","猴子能自己找食物",150,"good",2,1],
["餵食鴿子","可能造成群聚與疾病",-150,"bad",3,1],
["機會卡","抽一張機會卡",0,"special",4,1],
["觀察野生動物保持距離","尊重生活空間",150,"good",5,1],
["餵食松鼠","改變覓食習慣",-150,"bad",6,1],
["走步道不偏離路線","保護棲地",100,"good",7,1],
["大聲喧嘩驚嚇動物","造成緊張",-100,"bad",7,2],
["撿起垃圾保護環境","減少誤食垃圾",150,"good",7,3],
["宣導不餵食野生動物","讓更多人知道",200,"good",7,4],
["餵食野生動物可能害了牠","增加風險",-200,"bad",7,5],
["用相機拍照不干擾動物","安靜觀察",100,"good",7,6],
["追趕野生動物","造成壓力與受傷",-200,"bad",7,7],
["機會卡","抽一張機會卡",0,"special",6,7],
["梅花鹿需要自由","不需要你的食物",150,"good",5,7],
["採摘野生植物","破壞生態平衡",-150,"bad",4,7],
["機會卡","抽一張機會卡",0,"special",3,7],
["生態獎勵","再擲一次",0,"special",2,7],
["亂丟垃圾","破壞棲地",-150,"bad",1,7],
["動物救傷中心","協助救援",200,"good",1,6],
["餵食野生動物改變行為","搶食攻擊風險",-200,"bad",1,5],
["保護棲地人人有責","共同守護自然",150,"good",1,4],
["發現受傷動物通報救援","正確通報",200,"good",1,3],
["野保巡查隊","休息一回合",0,"special",1,2]
];
const cards=[
["你告訴朋友不要餵食猴子",200],
["你使用望遠鏡觀察野生動物",100],
["你撿起步道垃圾",150],
["你參加野保宣導活動",200],
["你通報受傷野生動物",250],
["你提醒遊客保持距離",150],
["你偷偷餵食猴子",-250],
["你用食物吸引動物拍照",-200],
["你餵食野鳥",-200],
["你追趕野生動物",-200],
["你亂丟垃圾",-150],
["你干擾動物休息",-150]
];
let players=[],turn=0,goal=2,ended=false;

function setupPlayers(){
  const n=Number(document.getElementById("count").value);
  const box=document.getElementById("playerSetup");
  box.innerHTML="";
  for(let i=0;i<n;i++){
    box.innerHTML += `<div class="player">
      <b style="color:${colors[i]}">玩家${i+1}</b><br>
      <input id="name${i}" value="玩家${i+1}" style="width:95px">
      <select id="animal${i}">${animals.map(a=>`<option>${a}</option>`).join("")}</select>
    </div>`;
  }
}

function drawBoard(target){
  const el=document.getElementById(target);
  el.innerHTML="";
  spaces.forEach((s,idx)=>{
    const tokens=players.map((p,i)=>p.pos===idx ? `<span class="token" style="background:${p.color}">${i+1}</span>` : "").join("");
    const cell=document.createElement("div");
    cell.className=`cell ${s[3]}`;
    cell.style.gridColumn=s[4];
    cell.style.gridRow=s[5];
    cell.innerHTML=`<span class="num">${idx}</span><br>
      <b>${s[0]}</b><br>
      <small>${s[1]}</small><br>
      <span class="score ${s[2]>0?'plus':s[2]<0?'minus':''}">${s[2]>0?'+':''}${s[2]||''}</span>
      <div class="tokens">${tokens}</div>`;
    el.appendChild(cell);
  });
  const center=document.createElement("div");
  center.className="center";
  center.innerHTML=`<h1>你的好意，可能害了牠</h1>
    <div class="wood">不餵食野生動物大富翁</div>
    <p><b>不餵食、不干擾、不追逐、不破壞棲地</b></p>`;
  el.appendChild(center);
}

function startGame(){
  goal=Number(document.getElementById("goal").value);
  const n=Number(document.getElementById("count").value);
  players=[];
  for(let i=0;i<n;i++){
    players.push({name:document.getElementById("name"+i).value||"玩家"+(i+1),animal:document.getElementById("animal"+i).value,score:1000,pos:0,laps:0,skip:false,color:colors[i]});
  }
  document.getElementById("setup").style.display="none";
  document.getElementById("game").style.display="grid";
  drawBoard("board"); updateStats(); addLog("遊戲開始！每位玩家野保積分 1000。");
}

function updateStats(){
  document.getElementById("stats").innerHTML=players.map((p,i)=>`
    <div class="player ${i===turn?'now':''}">
      <b style="color:${p.color}">玩家${i+1}｜${p.name}</b><br>
      ${p.animal}<br>
      野保積分：<b>${p.score}</b><br>
      圈數：${p.laps}/${goal}｜位置：${p.pos}
    </div>`).join("");
}

function rollDice(){
  if(ended) return;
  const p=players[turn];
  if(p.skip){p.skip=false;addLog(`${p.name} 在野保巡查隊休息一回合。`);nextTurn();return;}
  const d=Math.floor(Math.random()*6)+1;
  document.getElementById("dice").textContent=["⚀","⚁","⚂","⚃","⚄","⚅"][d-1];
  const old=p.pos;
  p.pos=(p.pos+d)%24;
  if(p.pos<old){p.laps++;p.score+=100;addLog(`${p.name} 經過起點 +100。`);}
  resolveSpace(p,d);
}

function resolveSpace(p,d){
  const s=spaces[p.pos];
  let msg=`${p.name} 擲出 ${d}，到「${s[0]}」。`;
  if(s[0]==="機會卡"){
    const c=cards[Math.floor(Math.random()*cards.length)];
    p.score+=c[1];
    msg+=`<br>🎴 機會卡：${c[0]} <b>${c[1]>0?'+':''}${c[1]}</b>`;
    popup("機會卡",`${c[0]}<br><span class="${c[1]>0?'plus':'minus'}">${c[1]>0?'+':''}${c[1]} 分</span>`);
  }else if(s[0]==="生態獎勵"){
    addLog(msg+" 生態獎勵，再擲一次！");
    drawBoard("board"); updateStats(); return;
  }else if(s[0]==="野保巡查隊"){
    p.skip=true; msg+=" 下回合休息一次。";
  }else{
    p.score+=s[2];
    msg+=` <span class="${s[2]>0?'plus':'minus'}">${s[2]>0?'+':''}${s[2]}</span>`;
    if(s[2]<0) msg+="<br><b>大家一起喊：你的好意，可能害了牠！</b>";
  }
  addLog(msg); drawBoard("board"); updateStats();
  if(players.some(x=>x.laps>=goal)) finishGame(); else nextTurn();
}

function nextTurn(){turn=(turn+1)%players.length;updateStats();drawBoard("board");}
function addLog(t){document.getElementById("log").innerHTML=t+"<hr>"+document.getElementById("log").innerHTML;}
function rank(score){if(score>=2000)return"🏆 野保超人";if(score>=1700)return"🥇 野保達人";if(score>=1400)return"🥈 生態守護者";if(score>=1100)return"🥉 野保小尖兵";return"🌱 保育新手";}
function finishGame(){ended=true;const sorted=[...players].sort((a,b)=>b.score-a.score);popup("遊戲結束",sorted.map((p,i)=>`<p><b>${i+1}. ${p.name}</b>：${p.score} 分<br>${rank(p.score)}</p>`).join("")+"<hr>記住：野生動物不需要人類餵食。");}
function popup(title,body){document.getElementById("modalCard").innerHTML=`<h2>${title}</h2><p>${body}</p><button onclick="closeModal()">知道了</button>`;document.getElementById("modal").style.display="flex";}
function closeModal(){document.getElementById("modal").style.display="none";}
function showRules(){popup("規則","擲骰子前進。正確行為加分，錯誤行為扣分。踩到機會卡就抽卡。經過起點 +100。完成指定圈數後，積分最高者獲勝。");}

setupPlayers();
drawBoard("preview");
</script>
</body>
</html>
